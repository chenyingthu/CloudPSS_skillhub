<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CloudPSS Skills - Observation Portal{% endblock %}</title>
    <style>
        /* Design System Variables */
        :root {
            --bg-primary: #1A1D21;
            --bg-secondary: #212529;
            --bg-tertiary: #2D333B;
            --accent-cyan: #22D3EE;
            --accent-green: #4ADE80;
            --accent-amber: #FBBF24;
            --accent-red: #EF4444;
            --text-primary: #F8F9FA;
            --text-secondary: #ADB5BD;
            --text-muted: #6C757D;
            --border-color: #343A40;
            --font-mono: 'Geist Mono', 'JetBrains Mono', 'Fira Code', monospace;
            --font-sans: 'Geist', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-cyan), #0891B2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--bg-primary);
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .logo-text span {
            color: var(--accent-cyan);
        }

        /* Navigation */
        .nav {
            display: flex;
            gap: 0.5rem;
        }

        .nav-link {
            padding: 0.5rem 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.2s;
            font-size: 0.875rem;
        }

        .nav-link:hover {
            color: var(--text-primary);
            background-color: var(--bg-tertiary);
        }

        .nav-link.active {
            color: var(--accent-cyan);
            background-color: rgba(34, 211, 238, 0.1);
        }

        /* Main Content */
        .main {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Cards */
        .card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.25rem;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            font-family: var(--font-mono);
            color: var(--text-primary);
        }

        .stat-value.success { color: var(--accent-green); }
        .stat-value.warning { color: var(--accent-amber); }
        .stat-value.error { color: var(--accent-red); }
        .stat-value.info { color: var(--accent-cyan); }

        /* Tables */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        th, td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        tr:hover {
            background-color: var(--bg-tertiary);
        }

        /* Status Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .badge-success {
            background-color: rgba(74, 222, 128, 0.1);
            color: var(--accent-green);
        }
        .badge-success::before { background-color: var(--accent-green); }

        .badge-running {
            background-color: rgba(34, 211, 238, 0.1);
            color: var(--accent-cyan);
        }
        .badge-running::before { background-color: var(--accent-cyan); }

        .badge-pending {
            background-color: rgba(251, 191, 36, 0.1);
            color: var(--accent-amber);
        }
        .badge-pending::before { background-color: var(--accent-amber); }

        .badge-failed {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--accent-red);
        }
        .badge-failed::before { background-color: var(--accent-red); }

        /* Progress Bar */
        .progress-bar {
            width: 100%;
            height: 4px;
            background-color: var(--bg-tertiary);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--accent-cyan);
            transition: width 0.3s ease;
        }

        /* Utilities */
        .text-mono {
            font-family: var(--font-mono);
        }

        .text-muted {
            color: var(--text-muted);
        }

        .text-secondary {
            color: var(--text-secondary);
        }

        .text-sm {
            font-size: 0.875rem;
        }

        .text-xs {
            font-size: 0.75rem;
        }

        .font-medium {
            font-weight: 500;
        }

        .font-semibold {
            font-weight: 600;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Links */
        a {
            color: var(--accent-cyan);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-icon">CP</div>
            <div class="logo-text">CloudPSS <span>Skills</span></div>
        </div>
        <nav class="nav">
            <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">仪表板</a>
            <a href="/tasks" class="nav-link {% if request.path == '/tasks' or request.path.startswith('/tasks/') %}active{% endif %}">任务</a>
            <a href="/cases" class="nav-link {% if request.path == '/cases' %}active{% endif %}">案例</a>
        </nav>
    </header>

    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Format datetime to local string
        function formatDateTime(isoString) {
            if (!isoString) return '-';
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN');
        }

        // Format relative time
        function formatRelativeTime(isoString) {
            if (!isoString) return '-';
            const date = new Date(isoString);
            const now = new Date();
            const diff = now - date;
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (days > 0) return `${days}天前`;
            if (hours > 0) return `${hours}小时前`;
            if (minutes > 0) return `${minutes}分钟前`;
            return '刚刚';
        }

        // Get status badge HTML
        function getStatusBadge(status) {
            const badges = {
                'completed': '<span class="badge badge-success">已完成</span>',
                'running': '<span class="badge badge-running">运行中</span>',
                'pending': '<span class="badge badge-pending">等待中</span>',
                'failed': '<span class="badge badge-failed">失败</span>',
                'cancelled': '<span class="badge badge-failed">已取消</span>'
            };
            return badges[status] || `<span class="badge">${status}</span>`;
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
