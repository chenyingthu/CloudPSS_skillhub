{% extends "base.html" %}

{% block title %}任务详情 - {{ task_id }} - CloudPSS Skills Portal{% endblock %}

{% block content %}
<div class="page-header">
    <a href="/tasks" class="back-link">← 返回任务列表</a>
    <h1 class="page-title">任务详情</h1>
    <code class="task-id">{{ task_id }}</code>
</div>

<div id="task-content">
    <div class="card">
        <div class="empty-state">
            <div class="empty-state-icon">⏳</div>
            <div>加载中...</div>
        </div>
    </div>
</div>

<style>
    .page-header {
        margin-bottom: 2rem;
    }

    .back-link {
        display: inline-block;
        margin-bottom: 1rem;
        color: var(--text-secondary);
        font-size: 0.875rem;
        text-decoration: none;
    }

    .back-link:hover {
        color: var(--accent-cyan);
    }

    .page-title {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
    }

    .task-id {
        font-family: var(--font-mono);
        font-size: 0.875rem;
        background-color: var(--bg-secondary);
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        color: var(--text-secondary);
    }

    .detail-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 1.5rem;
    }

    .detail-section {
        margin-bottom: 1.5rem;
    }

    .detail-section:last-child {
        margin-bottom: 0;
    }

    .detail-label {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-secondary);
        margin-bottom: 0.5rem;
    }

    .detail-value {
        font-size: 1rem;
        color: var(--text-primary);
    }

    .detail-value.large {
        font-size: 1.5rem;
        font-weight: 600;
    }

    .detail-value.mono {
        font-family: var(--font-mono);
        font-size: 0.875rem;
    }

    .progress-section {
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-color);
    }

    .progress-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.75rem;
    }

    .progress-bar-large {
        width: 100%;
        height: 8px;
        background-color: var(--bg-tertiary);
        border-radius: 4px;
        overflow: hidden;
    }

    .progress-bar-large .progress-fill {
        height: 100%;
        background-color: var(--accent-cyan);
        transition: width 0.3s ease;
    }

    .result-data {
        background-color: var(--bg-tertiary);
        border-radius: 6px;
        padding: 1rem;
        margin-top: 1rem;
    }

    .result-data pre {
        margin: 0;
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-secondary);
        overflow-x: auto;
    }

    .error-message {
        background-color: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        border-radius: 6px;
        padding: 1rem;
        color: var(--accent-red);
        margin-top: 1rem;
    }

    .timestamps {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-color);
    }
</style>

<script>
    const taskId = '{{ task_id }}';

    // Load task details
    async function loadTaskDetail() {
        try {
            const response = await fetch(`/api/tasks/${taskId}`);

            if (!response.ok) {
                if (response.status === 404) {
                    document.getElementById('task-content').innerHTML = `
                        <div class="card">
                            <div class="empty-state">
                                <div class="empty-state-icon">🔍</div>
                                <div>任务未找到</div>
                            </div>
                        </div>
                    `;
                    return;
                }
                throw new Error('Failed to load task');
            }

            const task = await response.json();

            // Build result section if available
            let resultSection = '';
            if (task.result_data) {
                resultSection = `
                    <div class="detail-section">
                        <div class="detail-label">结果数据</div>
                        <div class="result-data">
                            <pre>${JSON.stringify(task.result_data, null, 2)}</pre>
                        </div>
                    </div>
                `;
            }

            // Build error section if available
            let errorSection = '';
            if (task.error_message) {
                errorSection = `
                    <div class="detail-section">
                        <div class="detail-label">错误信息</div>
                        <div class="error-message">${task.error_message}</div>
                    </div>
                `;
            }

            document.getElementById('task-content').innerHTML = `
                <div class="card">
                    <div class="detail-grid">
                        <div class="detail-section">
                            <div class="detail-label">案例名称</div>
                            <div class="detail-value large">${task.case_name}</div>
                        </div>
                        <div class="detail-section">
                            <div class="detail-label">模型 RID</div>
                            <div class="detail-value mono">${task.model_rid}</div>
                        </div>
                        <div class="detail-section">
                            <div class="detail-label">任务类型</div>
                            <div class="detail-value">${task.task_type}</div>
                        </div>
                        <div class="detail-section">
                            <div class="detail-label">状态</div>
                            <div class="detail-value">${getStatusBadge(task.status)}</div>
                        </div>
                    </div>

                    <div class="progress-section">
                        <div class="progress-header">
                            <span class="detail-label">执行进度</span>
                            <span class="font-semibold">${task.progress}%</span>
                        </div>
                        <div class="progress-bar-large">
                            <div class="progress-fill" style="width: ${task.progress}%"></div>
                        </div>
                    </div>

                    <div class="detail-section" style="margin-top: 1.5rem;">
                        <div class="detail-label">状态消息</div>
                        <div class="detail-value">${task.message || '-'}</div>
                    </div>

                    ${resultSection}
                    ${errorSection}

                    <div class="timestamps">
                        <div class="detail-section">
                            <div class="detail-label">创建时间</div>
                            <div class="detail-value text-sm">${formatDateTime(task.created_at)}</div>
                        </div>
                        <div class="detail-section">
                            <div class="detail-label">最后更新</div>
                            <div class="detail-value text-sm">${formatDateTime(task.updated_at)}</div>
                        </div>
                        ${task.completed_at ? `
                            <div class="detail-section">
                                <div class="detail-label">完成时间</div>
                                <div class="detail-value text-sm">${formatDateTime(task.completed_at)}</div>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        } catch (error) {
            console.error('Failed to load task:', error);
            document.getElementById('task-content').innerHTML = `
                <div class="card">
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <div>加载失败</div>
                    </div>
                </div>
            `;
        }
    }

    // Load on page load
    loadTaskDetail();

    // Refresh every 5 seconds if task is still running
    setInterval(() => {
        const progressFill = document.querySelector('.progress-fill');
        if (progressFill && progressFill.style.width !== '100%') {
            loadTaskDetail();
        }
    }, 5000);
</script>
{% endblock %}
