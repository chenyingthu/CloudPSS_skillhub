# IEEE3模型准备配置
# 调整故障参数用于EMT仿真

skill: ieee3_prep

auth:
  token_file: .cloudpss_token

model:
  rid: model/holdme/IEEE3
  source: cloud

fault:
  start_time: 2.0         # 2秒时开始故障
  end_time: 2.1           # 2.1秒时故障清除

output:
  sampling_freq: 5000     # 5kHz采样
  path: ./models/prepared/
  filename: ieee3_short_fault.yaml
