# Small Signal Stability Test for IEEE39
skill: small_signal_stability

auth:
  token_file: .cloudpss_token

model:
  rid: model/holdme/IEEE39
  source: cloud

analysis:
  damping_threshold: 0.05
  freq_range: [0.1, 2.0]
  base_power: 100.0

output:
  format: json
  path: ./results/
  prefix: small_signal_ieee39
  generate_report: true
