# Harmonic Analysis Test for IEEE39
skill: harmonic_analysis

auth:
  token_file: .cloudpss_token

model:
  rid: model/holdme/IEEE39
  source: cloud

simulation:
  duration: 0.5
  step: 1e-5

analysis:
  fundamental_freq: 60.0
  max_harmonic: 50
  thd_limit: 5.0
  analysis_window: [0.4, 0.5]

channels:
  voltage:
    - "#Gen39.VT:0"
    - "#Gen38.VT:0"
  current:
    - "#Gen39.IT:0"
    - "#Gen38.IT:0"

output:
  format: json
  path: ./results/
  prefix: harmonic_ieee39
  generate_report: true
  export_spectrum: true
