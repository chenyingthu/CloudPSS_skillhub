# Transient Stability Test for IEEE39
skill: transient_stability

auth:
  token_file: .cloudpss_token

model:
  rid: model/holdme/IEEE39
  source: cloud

fault:
  location: "Bus7"
  fs: 2.5
  fe_values: [2.6, 2.7, 2.8]
  chg: 0.01

generators:
  monitored:
    - "Gen31"
    - "Gen32"
    - "Gen33"
    - "Gen34"
    - "Gen35"
    - "Gen36"
    - "Gen37"
    - "Gen38"
    - "Gen39"
    - "Gen30"
  speed_channels:
    - "#Gen31.wr:0"
    - "#Gen32.wr:0"
    - "#Gen33.wr:0"
    - "#Gen34.wr:0"
    - "#Gen35.wr:0"
    - "#Gen36.wr:0"
    - "#Gen37.wr:0"
    - "#Gen38.wr:0"
    - "#Gen39.wr:0"
    - "#Gen30.wr:0"
  power_channels:
    - "#Gen31.Pe:0"
    - "#Gen32.Pe:0"
    - "#Gen33.Pe:0"

assessment:
  stable_criterion: "damped"
  max_speed_deviation: 0.5
  analysis_window: [3.0, 8.0]
  settling_time_threshold: 0.02

output:
  format: json
  path: ./results/
  prefix: transient_stability_ieee39
  generate_report: true
