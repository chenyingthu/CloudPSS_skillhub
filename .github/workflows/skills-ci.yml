name: Skills CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'cloudpss_skills/**/*.py'
      - 'tests/**/*.py'
      - '.github/workflows/skills-ci.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CLOUDPSS_API_URL: ${{ secrets.CLOUDPSS_API_URL || 'http://166.111.60.76:50001' }}

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pyright

      - name: Run ruff
        run: |
          ruff check cloudpss_skills/ --select=E,F,W,C90 --ignore=E501
        continue-on-error: true

      - name: Run pyright
        run: |
          pyright cloudpss_skills/core/ || true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-randomly
          pip install -e ".[dev]"

      - name: Run unit tests (excluding integration tests)
        run: |
          python -m pytest tests/ \
            -m "not integration" \
            -v \
            --cov=cloudpss_skills \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: skills-unit-tests-py${{ matrix.python-version }}
          fail_ci_if_error: false

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[skip ci]') == false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -e ".[dev]"

      - name: Create CloudPSS token file
        run: |
          echo "${{ secrets.CLOUDPSS_TOKEN }}" > .cloudpss_token_internal
          echo "Token file created"

      - name: Run integration tests
        run: |
          python -m pytest tests/test_*_integration.py \
            -v \
            --run-integration \
            --tb=short \
            --timeout=300

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: test-results/
          retention-days: 7

  skill-smoke-tests:
    name: Skill Smoke Tests
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e "."

      - name: Smoke test - All skills load
        run: |
          python -c "
          import cloudpss_skills.builtin
          from cloudpss_skills import list_skills

          skills = list_skills()
          print(f'Total skills loaded: {len(skills)}')
          for skill in skills:
            print(f'  - {skill.name}')

          # Verify core skills exist
          skill_names = [s.name for s in skills]
          core_skills = ['power_flow', 'emt_simulation', 'n1_security', 'topology_check', 'param_scan', 'batch_powerflow']
          missing = [s for s in core_skills if s not in skill_names]
          if missing:
            print(f'ERROR: Missing core skills: {missing}')
            exit(1)

          print('All core skills present!')
          "

      - name: Smoke test - Config schema validation
        run: |
          python -c "
          from cloudpss_skills import get_skill

          # Test that all skills have valid config schemas
          skills_to_test = [
            'power_flow', 'emt_simulation', 'n1_security', 
            'topology_check', 'param_scan', 'batch_powerflow',
            'loss_analysis', 'voltage_stability', 'transient_stability'
          ]

          for skill_name in skills_to_test:
            skill = get_skill(skill_name)
            if skill:
              schema = skill.config_schema
              defaults = skill.get_default_config()
              print(f'{skill_name}: OK (has schema and defaults)')
            else:
              print(f'{skill_name}: WARNING - skill not found')
          "

  test-coverage-report:
    name: Test Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -e "."

      - name: Generate coverage report
        run: |
          python -m pytest tests/ -m "not integration" --cov=cloudpss_skills --cov-report=html --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

  skill-documentation:
    name: Generate Skill Documentation
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "."

      - name: Generate skill documentation
        run: |
          python -c "
          from cloudpss_skills import list_skills, get_skill
          from pathlib import Path

          skills = list_skills()

          # Generate markdown table
          lines = ['# Skill Inventory\n\n']
          lines.append('| Skill | Description | Status |\n')
          lines.append('|-------|-------------|--------|\n')

          for skill in sorted(skills, key=lambda s: s.name):
            desc = skill.description[:50] + '...' if len(skill.description) > 50 else skill.description
            lines.append(f'| {skill.name} | {desc} | OK |\n')

          output = Path('docs/skill_inventory.md')
          output.parent.mkdir(exist_ok=True)
          output.write_text(''.join(lines))
          print(f'Documentation generated: {output}')
          print(f'Total skills: {len(skills)}')
          "

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: skill-documentation
          path: docs/skill_inventory.md
