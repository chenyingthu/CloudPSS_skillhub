# IEEE3模型准备配置模板
# 用于调整故障参数和输出通道

skill: ieee3_prep

# 认证设置
auth:
  token_file: ".cloudpss_token"

# 模型设置
model:
  rid: "model/holdme/IEEE3"
  source: "cloud"

# 故障设置
fault:
  # 故障起始时间（秒）
  start_time: 2.5

  # 故障结束时间（秒）
  end_time: 2.7

# 输出设置
output:
  # 采样频率（Hz）
  sampling_freq: 2000

  # 输出目录
  path: "./"

  # 输出文件名
  filename: "ieee3_prepared.yaml"
