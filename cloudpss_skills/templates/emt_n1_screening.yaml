# EMT N-1 Security Screening - EMT N-1安全筛查
# 枚举支路单停运，评估故障下的系统安全性

skill: emt_n1_screening

# 认证配置
auth:
  token_file: .cloudpss_token

# 模型配置
model:
  rid: model/holdme/IEEE3
  source: cloud

# 支路扫描配置
scan:
  branches: []                  # 要检查的支路ID列表，空表示自动发现
  include_transformers: true    # 是否包含变压器
  limit: null                   # 最大检查支路数，null表示不限制

# 故障配置
fault:
  fs: 2.5        # 故障开始时间 (s)
  fe: 2.7        # 故障结束时间 (s)
  chg: 0.01      # 故障电阻参数

# 评估配置
assessment:
  monitored_buses:              # 要监测的母线电压通道
    - "Bus7"
  power_trace: "#P1:0"          # 功率支撑通道
  time_windows:                 # RMS计算时间窗口
    prefault: [2.42, 2.44]
    fault: [2.56, 2.58]
    postfault: [2.92, 2.94]
    late_recovery: [2.96, 2.98]
  severity_thresholds:          # 严重度分级阈值
    warning: 10.0
    critical: 15.0

# 输出配置
output:
  format: json
  path: ./results/
  prefix: emt_n1_screening
  generate_report: true
