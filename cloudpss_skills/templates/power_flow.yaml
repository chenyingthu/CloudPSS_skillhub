# 潮流计算配置模板

skill: power_flow

# 认证设置
auth:
  token_file: ".cloudpss_token"

# 模型设置
model:
  rid: "model/holdme/IEEE39"
  source: "cloud"

# 算法设置
algorithm:
  # 算法类型: newton_raphson | fast_decoupled
  type: "newton_raphson"

  # 收敛精度
  tolerance: 1.0e-6

  # 最大迭代次数
  max_iterations: 100

# 输出设置
output:
  format: "json"
  path: "./results/"
  prefix: "power_flow"
  timestamp: true
